<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="time tracking.css">
    <title>Time Tracking Dashboard</title>
</head>
<body>
<div class="section">
    <div class="miet">
    <div class="time">
        <img src="image/image-jeremy.png">
        <div class="report">
        <p>Report for</p>
        <h2>Jeremy<br>Robson</h2>
        </div>
    </div>
    <div class="run">
         <p class="daily">Daily</p>
         <p>Weekly</p>
         <p class="daily">Monthly</p>
    </div>
    </div>
<div class="down">
    <div class="you">
    <div class="work">
        <img src="image/icon-work.svg">
    </div>
    <div class="next">
        <div class="ram">
            <h6>Work</h6>
            <img src="image/icon-ellipsis.svg">
        </div>
        <div class="ink">
        <h2>32hrs</h2>
        <p>last week - 36hrs</p>
        </div>
    </div>
    </div>
    <div class="him">
    <div class="exercise">
        <img src="image/icon-exercise.svg">
    </div>
    <div class="up">
        <div class="cow">
            <h6>Exercise</h6>
            <img src="image/icon-ellipsis.svg">
        </div>
        <div class="ink">
        <h2>4hrs</h2>
        <p>last week - 5hrs</p>
        </div>
    </div>
    </div>
</div>
<div class="down">
    <div class="you">
    <div class="work">
        <img src="image/icon-play.svg">
    </div>
    <div class="next">
        <div class="ram">
            <h6>Play</h6>
            <img src="image/icon-ellipsis.svg">
        </div>
        <div class="ink">
        <h2>10hrs</h2>
        <p>last week - 8hrs</p>
        </div>
    </div>
    </div>
    <div class="him">
    <div class="exercise">
        <img src="image/icon-social.svg">
    </div>
    <div class="up">
        <div class="cow">
            <h6>Social</h6>
            <img src="image/icon-ellipsis.svg">
        </div>
        <div class="ink">
        <h2>5hrs</h2>
        <p>last week - 10hrs</p>
        </div>
    </div>
    </div> 
</div>
<div class="down">
    <div class="you">
    <div class="work">
        <img src="image/icon-study.svg">
    </div>
    <div class="next">
        <div class="ram">
            <h6>Study</h6>
            <img src="image/icon-ellipsis.svg">
        </div>
        <div class="ink">
        <h2>4hrs</h2>
        <p>last week - 7hrs</p>
        </div>
    </div>
    </div>
    <div class="him">
    <div class="exercise">
        <img src="image/icon-self-care.svg">
    </div>
    <div class="up">
        <div class="cow">
            <h6>Self Care</h6>
            <img src="image/icon-ellipsis.svg">
        </div>
        <div class="ink">
        <h2>2hrs</h2>
        <p>last week - 2hrs</p>
        </div>
    </div>
    </div>    
</div>
</div>
</body>
</html>
