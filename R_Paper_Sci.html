<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="R_Paper_Sci.css"/>
</head>
<body>
  <div class="game-container">
    <h1>✊ ✋ ✌️ Rock Paper Scissors</h1>
    <div class="choices">
      <button class="choice" data-choice="rock">✊ Rock</button>
      <button class="choice" data-choice="paper">✋ Paper</button>
      <button class="choice" data-choice="scissors">✌️ Scissors</button>
    </div>

    <div class="result">
      <h2 id="resultText">Make your choice!</h2>
      <p id="playerChoice"></p>
      <p id="computerChoice"></p>
      <h3>Score: <span id="score">0</span></h3>
    </div>
  </div>

  <script src="R_Paper_Sci.js"></script>
</body>
</html>
