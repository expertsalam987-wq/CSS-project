<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Associative Array Js</title>
</head>
<body>
    

    <script>
        var genders={1:"male",2:"female",male:"1"}
        console.log(genders[2]);
        console.log(genders.male);
    </script>
    <script>
        var partofspeech={Noun:"Bola",Verb:"go",Preposition:"to",pronoun:"school"}
        for(let key in partofspeech){
            console.log(partofspeech[key],);
        }
        // partofspeech.forEach(key => {
        //     console.log(partofspeech[key]);
        // });
    </script>
</body>
</html>
