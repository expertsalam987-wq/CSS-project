<!doctype html>
<html lang="en"
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid layout</title>
    <head>
    <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body{
        background-color: red;
      }
      @media screen and (max-width) {
        body{
          background-color:blue;
        }
      }
      .grid-money{
        display: grid;
      }
      .container{
        display: grid;
        grid-template-columns: repeat(auto-fill, mimax(250px 1fr));
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-columns: 1fr 3fr 1fr;
        grid-gap:5px 10px;
        grid-template-rows: 200px 100px;
        width: 100%;
      }
      .grid-container .item{
        grid-gap: 10px;
        padding: 10px;

      }
      .grid-money{
        display: grid;
      }
      .sidebar{
        display: grid;
        font-size: 5%;
        text-align: start;
      }
      main{
        display: gridaa;
        text-align: right;
      }
      .grid-container .item{
            padding: 10px;
      }
      header{
        text-align: center;
      }
    </style>
    </head>
    <body>
        <div class="grid-money">
          <div class="sidebar">
            <h2>sidebar</h2>
            </div>
        <div class="header">
            <h2>header</h2>  
            </div>
        <div class="container">
            <div class="item"><img src="image/Inked476195309_597870183025647_6724901117542600882_n_LI.jpg"></div>
            <div class="item">box 1</div>
            <div class="item">box 2</div>
            <div class="item">box 3</div>
            <div class="item"><footer> footer </footer></div>
        </div>
       </div>
    </body>
