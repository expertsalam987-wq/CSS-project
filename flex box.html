<!doctype html>
<html>
<head>
<title>flexbox</title>
<style>
.ab{display:flex;
    flex:12;
     align-items:0%;}
img{height:500px;
     flex:5;}
.b1b2b3{display:flex;
        background-color:blue;
          gap:10px;}
.bc{display:flex;
    flex-direction:column;
     background-color:red;
      flex:7;}
h1{font-size:50px;
     float:inline-start;
      padding-left:200px;
       flex:12;}
</style>
</head>
<body>
<main>
<section>
<div class="ab">
<img src="image/tool4.png">
<div class="bc">
<div class="b1b2b3">
<div>box 1</div>
<div>box 2</div>
<div>box 3</div>
</div>
<div> panel 1 </div>
</div>
</div>
</div>
</section>
<section>
<h1> Text box </h1>
</section>
</main>
</body>
</html>
