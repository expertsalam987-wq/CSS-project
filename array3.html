<!DOCTYPE html>
<html>
<title>array</title>
<body>
  <h2>Even Numbers from 1 to 100:</h2>
  <div id="even-numbers"></div>

  <script>
    const outputDiv = document.getElementById('even-numbers');
    let output = '';

    for (let i = 1; i <= 100; i++) {
      if (i % 2 === 0) {
        output += i + '<br>';
      }
    }

    outputDiv.innerHTML = output;
  </script>
</body>
</html>
